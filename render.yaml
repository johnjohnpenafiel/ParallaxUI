services:
  - type: web
    name: parallaxui-api
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install -r requirements.txt && cd server && flask db upgrade
    startCommand: cd server && gunicorn application:application --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_APP
        value: application:application
      - key: PYTHON_VERSION
        value: 3.13.11
      - key: DB_URI
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: API_URL
        sync: false
